<style>
    .project {
        border: solid var(--chinese-silver) 1px;
        border-radius: 9px;
        margin: 6px;
    }
    .project h5 {
        color: black;
        background-color: var(--chinese-silver);
        border-radius: 6px 6px 0 0;
        text-align: center;
    }
    .project a h5:hover {
        color: var(--dark-charcoal);
        text-decoration: none;
    }
    .frame {
        padding: 0 12px 40% 12px;
        width: 100%;
        height: 0;
        overflow: hidden;
        margin: auto;
    }
    .frame img{
        width: 100%;
    }
</style>
<h1>Code & Datasets</h1>
<div class="row no-gutters">
    <ng-container *ngFor="let project of projects">
        <div *ngIf="project.dataset" class="col-12 col-md-6">
            <div class="project">
                <a href="{{ project.page }}">
                    <h5>{{ project.name }}</h5>
                    <div class="frame"><img class="profile" src="{{ project.image }}"></div>  
                </a>
            </div>
        </div>
    </ng-container>
</div>
