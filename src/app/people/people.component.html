<style>
    .profile{
        width: 100px; 
        height: 100px; 
    }
</style>
<h1>People</h1>

<h3>Faculty</h3>
<div *ngFor="let person of people">
    <div *ngIf="person.position == 'Faculty'">
        <div><a *ngIf="person.url" href="https://{{ person.url }}" target="_blank">{{ person.name }}</a><a *ngIf="!person.url">{{ person.name }}</a></div>  
        <img class="profile" src="{{ person.image }}">  
    </div>
</div>
